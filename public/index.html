	<!-- Основной JS (точка входа) -->
	<script type="module" src="./src/main.js"></script>
	<script>
		notes = document.querySelector(".notes");
		tasks = document.querySelector(".tasks");
		settings = document.querySelector(".settings");
		button_notes = document.querySelector("#button_notes");
		button_tasks = document.querySelector("#button_tasks");
		button_settings = document.querySelector("#button_settings");
		button_notes.onclick = () => {
			notes.style.display = "block";
			tasks.style.display = "none";
			settings.style.display = "none";
			button_notes.style.color = "#336BFA";
			Array.from(button_notes.firstElementChild.children).forEach((e) => e.style.fill = "#336BFA");
			button_tasks.style.color = "#09A39B";
			Array.from(button_tasks.firstElementChild.children).forEach((e) => e.style.fill = "#09A39B");
			button_settings.style.color = "#09A39B";
			Array.from(button_settings.firstElementChild.children).forEach((e) => e.style.fill = "#09A39B");
		};
		button_tasks.onclick = () => {
			notes.style.display = "none";
			tasks.style.display = "block";
			settings.style.display = "none";
			button_notes.style.color = "#09A39B";
			Array.from(button_notes.firstElementChild.children).forEach((e) => e.style.fill = "#09A39B");
			button_tasks.style.color = "#336BFA";
			Array.from(button_tasks.firstElementChild.children).forEach((e) => e.style.fill = "#336BFA");
			button_settings.style.color = "#09A39B";
			Array.from(button_settings.firstElementChild.children).forEach((e) => e.style.fill = "#09A39B");
		};
		button_settings.onclick = () => {
			notes.style.display = "none";
			tasks.style.display = "none";
			settings.style.display = "block";
			button_notes.style.color = "#09A39B";
			Array.from(button_notes.firstElementChild.children).forEach((e) => e.style.fill = "#09A39B");
			button_tasks.style.color = "#09A39B";
			Array.from(button_tasks.firstElementChild.children).forEach((e) => e.style.fill = "#09A39B");
			button_settings.style.color = "#336BFA";
			Array.from(button_settings.firstElementChild.children).forEach((e) => e.style.fill = "#336BFA");
		};
	</script>
